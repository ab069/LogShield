version: "3.9"
services:
  postgres: { image: postgres:16-alpine, environment: { POSTGRES_DB: logshield, POSTGRES_USER: logshield, POSTGRES_PASSWORD: logshield_secret }, ports: ["5432:5432"], volumes: [postgres_data:/var/lib/postgresql/data] }
  redis: { image: redis:7-alpine, ports: ["6379:6379"] }
  backend: { build: ./backend, ports: ["8000:8000"], depends_on: [postgres, redis], environment: { DATABASE_URL: "postgresql+asyncpg://logshield:logshield_secret@postgres:5432/logshield", REDIS_URL: "redis://redis:6379/0" } }
  frontend: { build: ./frontend, ports: ["3000:3000"], depends_on: [backend] }
volumes: { postgres_data: }
